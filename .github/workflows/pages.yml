name: Equity valuation → Pages

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker a valorar y publicar (p.ej. AAPL, JPM, O, XOM)"
        required: true
        type: string
      profile:
        description: "Forzar perfil (auto = clasificación automática)"
        required: false
        type: choice
        default: "auto"
        options: ["auto", "standard", "bank", "insurance", "reit", "utility", "cyclical", "high_growth"]
      provider:
        description: "Fuente de datos"
        required: false
        type: choice
        default: "auto"
        options: ["auto", "fmp", "yfinance"]
      risk_free: {description: "Tasa libre de riesgo", required: false, default: "0.043"}
      erp: {description: "Prima de riesgo (ERP)", required: false, default: "0.046"}
      country_premium: {description: "Prima país", required: false, default: "0.0"}
      terminal_growth: {description: "Crecimiento terminal g", required: false, default: "0.025"}

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: "pip"}

      - name: Install deps + wkhtmltopdf
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y wkhtmltopdf

      - name: Generate report into docs/reports
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          mkdir -p docs/reports
          T="${{ github.event.inputs.ticker }}"
          ARGS="$T --provider ${{ github.event.inputs.provider }} --pdf --xlsx"
          ARGS="$ARGS --rf ${{ github.event.inputs.risk_free }} --erp ${{ github.event.inputs.erp }}"
          ARGS="$ARGS --country-premium ${{ github.event.inputs.country_premium }}"
          ARGS="$ARGS --terminal-growth ${{ github.event.inputs.terminal_growth }}"
          if [ "${{ github.event.inputs.profile }}" != "auto" ]; then
            ARGS="$ARGS --profile ${{ github.event.inputs.profile }}"
          fi
          python valorar.py $ARGS \
            -o "docs/reports/${T}.html" \
            --json "docs/reports/${T}.json"

      - name: Rebuild index
        run: python scripts/build_index.py --docs docs

      - name: Commit & push to /docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "valuation: ${{ github.event.inputs.ticker }}" || echo "nothing to commit"
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git push

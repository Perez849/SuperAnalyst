name: Equity valuation (on-demand)

# Lanza a mano desde la pestaña Actions: eliges el ticker y los parámetros.
on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker a valorar (p.ej. AAPL, JPM, O, XOM, SAN.MC)"
        required: true
        type: string
      profile:
        description: "Forzar perfil (vacío = auto-clasificado)"
        required: false
        type: choice
        default: "auto"
        options: ["auto", "standard", "bank", "insurance", "reit", "utility", "cyclical", "high_growth"]
      provider:
        description: "Fuente de datos"
        required: false
        type: choice
        default: "auto"
        options: ["auto", "fmp", "yfinance"]

jobs:
  valuation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install PDF engine (wkhtmltopdf)
        run: sudo apt-get update && sudo apt-get install -y wkhtmltopdf

      - name: Run valuation
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}   # opcional; sin él usa yfinance
        run: |
          TICKER="${{ github.event.inputs.ticker }}"
          ARGS="$TICKER --provider ${{ github.event.inputs.provider }} --pdf --xlsx"
          if [ "${{ github.event.inputs.profile }}" != "auto" ]; then
            ARGS="$ARGS --profile ${{ github.event.inputs.profile }}"
          fi
          echo "Ejecutando: python valorar.py $ARGS"
          python valorar.py $ARGS -o "${TICKER}_valuation.html"

      - name: Upload report (HTML + PDF)
        uses: actions/upload-artifact@v4
        with:
          name: valuation-${{ github.event.inputs.ticker }}
          path: |
            *_valuation.html
            *_valuation.pdf
            *_valuation.xlsx
          retention-days: 90
